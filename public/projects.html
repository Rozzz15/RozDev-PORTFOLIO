      { title: "Customer Journey Automation", description: "Mapped and automated the entire customer journey from first touchpoint to repeat engagement and retention.", url: "#", category: "Mobile App", tags: ["Customer Journey", "CRM", "Email Automation"], image: "/images/s2.png" },
    ];

    const categories = ["All", "Websites", "Web Portfolio", "Web Invitation", "Mobile App", "Custom Games", "Graphics Design", "Video Editing"];

    let activeCategory = "All";
    let searchQuery = "";

    function renderFilters() {
      const filtersEl = document.getElementById("filters");
      filtersEl.innerHTML = categories.map(cat =>
        `<button class="filter-btn cursor-target ${cat === activeCategory ? 'active' : ''}" onclick="filterProjects('${cat}')">${cat}</button>`
      ).join("");
    }

    function handleSearch() {
      searchQuery = document.getElementById("searchInput").value.toLowerCase();
      renderProjects();
    }

    function renderProjects() {
      const grid = document.getElementById("grid");
      const filtered = projects.filter(p => {
        const matchCategory = activeCategory === "All" || p.category === activeCategory;
        const matchSearch = !searchQuery || p.title.toLowerCase().includes(searchQuery) || p.tags.some(t => t.toLowerCase().includes(searchQuery));
        return matchCategory && matchSearch;
      });
      grid.innerHTML = filtered.map((p, i) => {
        var thumb = p.video
          ? '<video src="' + p.video + '" autoplay loop muted playsInline preload="auto" draggable="false" oncontextmenu="return false" class="card-image"></video>'
          : '<img src="' + p.image + '" alt="' + p.title + '" class="card-image" draggable="false" oncontextmenu="return false" onerror="this.style.display=\'none\'">';
        return '<div class="card cursor-target" onclick="openProject(' + i + ')">' +
          '<div class="card-image-wrap">' + thumb + '</div>' +
          '<span class="card-category">' + p.category + '</span>' +
          '<h3 class="card-title">' + p.title + '</h3>' +
        '</div>';
      }).join("");
    }

    let currentProject = null;

    function openProject(index) {
      const filtered = getFilteredProjects();
      currentProject = filtered[index];
      if (!currentProject) return;

      document.getElementById("modalOverlay").classList.add("open");
      document.getElementById("modal").classList.add("open");
      document.body.style.overflow = "hidden";

      const mediaEl = document.getElementById("modalMedia");
      const closeBtn = '<button class="modal-close" onclick="closeModal()">✕</button>';
      if (currentProject.video) {
        mediaEl.innerHTML = '<video src="' + currentProject.video + '" autoplay loop muted playsInline preload="auto" controlsList="nodownload" oncontextmenu="return false" draggable="false" style="width:100%;max-height:80vh;object-fit:contain;display:block;background:#000"></video>' + closeBtn;
      } else {
        mediaEl.innerHTML = '<img src="' + currentProject.image + '" alt="' + currentProject.title + '" draggable="false" oncontextmenu="return false" style="width:100%;aspect-ratio:16/9;object-fit:cover;display:block" />' + closeBtn;
      }

      document.getElementById("modalCategory").textContent = currentProject.category;
      document.getElementById("modalTitle").textContent = currentProject.title;

      const launchEl = document.getElementById("modalLaunch");
      launchEl.href = currentProject.url;
      launchEl.style.display = currentProject.url && currentProject.url !== "#" ? "inline-flex" : "none";

      document.getElementById("modalTags").innerHTML = currentProject.tags.map(function(t) { return '<span class="modal-tag">' + t + '</span>'; }).join("");
      document.getElementById("modalDesc").textContent = currentProject.description;

      const hasGallery = currentProject.gallery && currentProject.gallery.length > 0;
      document.getElementById("modalGallery").style.display = hasGallery ? "block" : "none";
      if (hasGallery) {
        document.getElementById("modalGalleryLabel").textContent = "Gallery (" + currentProject.gallery.length + ")";
        var html = "";
        for (var g = 0; g < currentProject.gallery.length; g++) {
          html += '<img class="cursor-target" src="' + currentProject.gallery[g] + '" draggable="false" oncontextmenu="return false" onclick="openLightbox(' + g + ')">';
        }
        document.getElementById("modalGalleryGrid").innerHTML = html;
      }
    }

    function closeModal() {
      document.getElementById("modalOverlay").classList.remove("open");
      document.getElementById("modal").classList.remove("open");
      document.body.style.overflow = "";
      var video = document.querySelector("#modalMedia video");
      if (video) video.pause();
      currentProject = null;
    }

    document.getElementById("modalOverlay").addEventListener("click", closeModal);

    function openLightbox(index) {
      if (!currentProject || !currentProject.gallery) return;
      document.getElementById("lightbox").classList.add("open");
      document.getElementById("lightboxImg").src = currentProject.gallery[index];
      document.getElementById("lightboxImg").setAttribute("data-index", index);
    }

    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("open");
    }

    function navLightbox(dir) {
      if (!currentProject || !currentProject.gallery) return;
      var img = document.getElementById("lightboxImg");
      var i = parseInt(img.getAttribute("data-index")) || 0;
      var len = currentProject.gallery.length;
      i = (i + dir + len) % len;
      img.src = currentProject.gallery[i];
      img.setAttribute("data-index", i);
    }

    function getFilteredProjects() {
      return projects.filter(p => {
        const matchCategory = activeCategory === "All" || p.category === activeCategory;
        const matchSearch = !searchQuery || p.title.toLowerCase().includes(searchQuery) || p.tags.some(t => t.toLowerCase().includes(searchQuery));
        return matchCategory && matchSearch;
      });
    }

    function filterProjects(category) {
      activeCategory = category;
      renderFilters();
      renderProjects();
    }

    var isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0 || window.innerWidth <= 768;
    if (!isMobile && typeof gsap !== 'undefined') {
      document.body.style.cursor = 'none';
      var cursor = document.getElementById('cursor');
      var corners = [document.getElementById('cornerTl'), document.getElementById('cornerTr'), document.getElementById('cornerBr'), document.getElementById('cornerBl')];
      var dot = document.getElementById('cursorDot');
      var targetSelector = '.cursor-target';
      var activeTarget = null;
      var spinTl = null;
      var cornerPositions = null;
      var activeStrength = { current: 0 };
      var tickerFn = null;

      gsap.set(cursor, { xPercent: -50, yPercent: -50, x: window.innerWidth / 2, y: window.innerHeight / 2 });

      spinTl = gsap.timeline({ repeat: -1 }).to(cursor, { rotation: '+=360', duration: 2, ease: 'none' });

      tickerFn = function() {
        if (!cornerPositions || !cursor) return;
        var strength = activeStrength.current;
        if (strength === 0) return;
        var cursorX = gsap.getProperty(cursor, 'x');
        var cursorY = gsap.getProperty(cursor, 'y');
        for (var i = 0; i < 4; i++) {
          var cx = gsap.getProperty(corners[i], 'x');
          var cy = gsap.getProperty(corners[i], 'y');
          var tx = cornerPositions[i].x - cursorX;
          var ty = cornerPositions[i].y - cursorY;
          gsap.to(corners[i], { x: cx + (tx - cx) * strength, y: cy + (ty - cy) * strength, duration: 0.05, overwrite: 'auto' });
        }
      };

      document.addEventListener('mousemove', function(e) {
        gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1, ease: 'power3.out' });
      });

      document.addEventListener('mouseover', function(e) {
        var target = e.target.closest(targetSelector);
        if (!target || !cursor) return;
        if (target === activeTarget) return;
        if (activeTarget) {
          var old = activeTarget;
          var handler = old._leaveHandler;
          if (handler) old.removeEventListener('mouseleave', handler);
        }
        activeTarget = target;
        for (var i = 0; i < 4; i++) gsap.killTweensOf(corners[i], 'x,y');
        gsap.killTweensOf(cursor, 'rotation');
        if (spinTl) spinTl.pause();
        gsap.set(cursor, { rotation: 0 });

        var r = target.getBoundingClientRect();
        var bw = 3, cs = 12;
        cornerPositions = [
          { x: r.left - bw, y: r.top - bw },
          { x: r.right + bw - cs, y: r.top - bw },
          { x: r.right + bw - cs, y: r.bottom + bw - cs },
          { x: r.left - bw, y: r.bottom + bw - cs }
        ];

        gsap.ticker.add(tickerFn);
        gsap.to(activeStrength, { current: 1, duration: 0.2, ease: 'power2.out' });

        var cx = gsap.getProperty(cursor, 'x');
        var cy = gsap.getProperty(cursor, 'y');
        for (var i = 0; i < 4; i++) {
          gsap.to(corners[i], { x: cornerPositions[i].x - cx, y: cornerPositions[i].y - cy, duration: 0.2, ease: 'power2.out' });
        }

        var leaveHandler = function() {
          gsap.ticker.remove(tickerFn);
          activeTarget = null;
          cornerPositions = null;
          gsap.set(activeStrength, { current: 0, overwrite: true });
          for (var i = 0; i < 4; i++) gsap.killTweensOf(corners[i], 'x,y');
          var pos = [
            { x: -cs * 1.5, y: -cs * 1.5 },
            { x: cs * 0.5, y: -cs * 1.5 },
            { x: cs * 0.5, y: cs * 0.5 },
            { x: -cs * 1.5, y: cs * 0.5 }
          ];
          for (var i = 0; i < 4; i++) gsap.to(corners[i], { x: pos[i].x, y: pos[i].y, duration: 0.3, ease: 'power3.out' });
          setTimeout(function() {
            if (!activeTarget && cursor && spinTl) {
              var r2 = gsap.getProperty(cursor, 'rotation') % 360;
              spinTl.kill();
              spinTl = gsap.timeline({ repeat: -1 }).to(cursor, { rotation: '+=360', duration: 2, ease: 'none' });
              gsap.to(cursor, { rotation: r2 + 360, duration: 2 * (1 - r2 / 360), ease: 'none', onComplete: function() { spinTl.restart(); } });
            }
          }, 50);
          target.removeEventListener('mouseleave', leaveHandler);
        };

        target._leaveHandler = leaveHandler;
        target.addEventListener('mouseleave', leaveHandler);
      });

      document.addEventListener('mousedown', function() {
        gsap.to(dot, { scale: 0.7, duration: 0.3 });
        gsap.to(cursor, { scale: 0.9, duration: 0.2 });
      });
      document.addEventListener('mouseup', function() {
        gsap.to(dot, { scale: 1, duration: 0.3 });
        gsap.to(cursor, { scale: 1, duration: 0.2 });
      });
    }

    const params = new URLSearchParams(window.location.search);
    const categoryParam = params.get("category");
    if (categoryParam && categories.includes(categoryParam)) {
      activeCategory = categoryParam;
    }

    renderFilters();
    renderProjects();
  </script>
</body>
</html>
